name: CI/CD

on:
  pull_request:
    branches: [ main ]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag (contoh: v0.1.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make libssl-dev valgrind

    - name: Build
      run: make clean && make

    - name: Build with HTTPS
      run: make clean && make https

    - name: Run tests
      run: |
        ./build/synx &
        PID=$!
        sleep 2
        curl -s http://localhost:8080/ > /dev/null
        curl -s http://localhost:8080/style.css > /dev/null
        curl -s http://localhost:8080/nonexistent > /dev/null
        kill $PID || true
        wait $PID || true

    - name: Memory leak check
      run: |
        timeout 5 valgrind --leak-check=full --error-exitcode=1 ./build/synx || true

  benchmark:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make

    - name: Build optimized
      run: make clean && make

    - name: Run benchmark
      run: |
        ./build/synx --benchmark &
        PID=$!
        sleep 12
        wait $PID || true

  build-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make libssl-dev

    - name: Build release binary
      run: make release-binary

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: synx-linux-x86_64
        path: build/synx
        retention-days: 1

  build-release-aarch64:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4

    - name: Install cross-compile tools
      run: |
        sudo dpkg --add-architecture arm64
        
        # Add ubuntu ports for arm64 packages
        cat <<EOF | sudo tee /etc/apt/sources.list.d/arm64-cross.list
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble main restricted universe multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble-updates main restricted universe multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble-security main restricted universe multiverse
        EOF
        
        # Modify existing sources to only look for amd64
        sudo sed -i 's/deb /deb [arch=amd64] /g' /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list || true
        
        sudo apt-get update
        sudo apt-get install -y g++-aarch64-linux-gnu libssl-dev:arm64

    - name: Build for ARM64
      run: |
        make clean
        CXX=aarch64-linux-gnu-g++ CXXFLAGS="-std=c++17 -Wall -Wextra -O3 -flto -DENABLE_HTTPS" LDFLAGS="-pthread -flto -lssl -lcrypto" make https
        aarch64-linux-gnu-strip build/synx

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: synx-linux-aarch64
        path: build/synx
        retention-days: 1

  create-release:
    runs-on: ubuntu-latest
    needs: [build-release, build-release-aarch64]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4

    - name: Download x86_64 binary
      uses: actions/download-artifact@v4
      with:
        name: synx-linux-x86_64
        path: ./x86_64

    - name: Download aarch64 binary
      uses: actions/download-artifact@v4
      with:
        name: synx-linux-aarch64
        path: ./aarch64

    - name: Create release archives
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          RAW_VERSION="${{ github.event.inputs.tag }}"
          VERSION=${RAW_VERSION#v}
        else
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        
        # x86_64 package
        cp ./x86_64/synx ./synx
        tar -czvf synx-${VERSION}-linux-x86_64.tar.gz synx synx.conf README.md
        sha256sum synx-${VERSION}-linux-x86_64.tar.gz > synx-${VERSION}-linux-x86_64.tar.gz.sha256
        
        # aarch64 package
        cp ./aarch64/synx ./synx
        tar -czvf synx-${VERSION}-linux-aarch64.tar.gz synx synx.conf README.md
        sha256sum synx-${VERSION}-linux-aarch64.tar.gz > synx-${VERSION}-linux-aarch64.tar.gz.sha256
        
        rm -f synx

    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        name: Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        files: |
          synx-*-linux-x86_64.tar.gz
          synx-*-linux-x86_64.tar.gz.sha256
          synx-*-linux-aarch64.tar.gz
          synx-*-linux-aarch64.tar.gz.sha256
        generate_release_notes: true

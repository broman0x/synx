# synx configuration file - Production Ready

port = 8080
root = ./public
log = access.log
max_connections = 1024
buffer_size = 8192
keepalive_timeout = 30
worker_count = 4
request_timeout = 30
max_request_size = 1048576
rate_limit = 100

https_enable = false
https_port = 8443
https_cert = cert.crt
https_key = cert.key

reverse_proxy = false

benchmark_mode = false
benchmark_duration = 10
benchmark_connections = 100
